app-id: io.github.kmwallio.ultimateslice
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: ultimate-slice
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/mnt
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
  env:
    CARGO_HOME: /run/build/ultimate-slice/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
modules:
  - name: onnxruntime
    buildsystem: simple
    build-commands:
      - cmake -S cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/app -DCMAKE_INSTALL_LIBDIR=lib -DPython_EXECUTABLE=/usr/bin/python3 -Donnxruntime_BUILD_SHARED_LIB=ON -Donnxruntime_RUN_ONNX_TESTS=OFF -Donnxruntime_BUILD_UNIT_TESTS=OFF -Donnxruntime_BUILD_BENCHMARKS=OFF -Donnxruntime_GENERATE_TEST_REPORTS=OFF -Donnxruntime_USE_VCPKG=OFF -Donnxruntime_USE_CUDA=OFF -Donnxruntime_USE_DNNL=OFF -Donnxruntime_USE_MIMALLOC=OFF -Donnxruntime_USE_OPENVINO=OFF -Donnxruntime_USE_XNNPACK=OFF -DFETCHCONTENT_TRY_FIND_PACKAGE_MODE=NEVER -Donnxruntime_CMAKE_DEPS_MIRROR_DIR=/run/build/onnxruntime/mirror
      - cmake --build build --parallel ${FLATPAK_BUILDER_N_JOBS}
      - cmake --install build
      - install -Dm644 LICENSE /app/share/licenses/onnxruntime/LICENSE
      - install -Dm644 ThirdPartyNotices.txt /app/share/licenses/onnxruntime/ThirdPartyNotices.txt
    sources:
      - type: git
        url: https://github.com/microsoft/onnxruntime.git
        tag: v1.24.2
        commit: 058787ceead760166e3c50a0a4cba8a833a6f53f
        disable-submodules: true
      - onnxruntime-sources.json
  - name: ultimate-slice
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/ultimate-slice/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        ORT_LIB_LOCATION: /app/lib
        ORT_PREFER_DYNAMIC_LINK: "1"
        ORT_SKIP_DOWNLOAD: "1"
    build-commands:
      - cargo --offline build --release --locked
      - install -Dm755 target/release/ultimate-slice /app/bin/ultimate-slice
      - install -Dm644 data/io.github.kmwallio.ultimateslice.desktop /app/share/applications/io.github.kmwallio.ultimateslice.desktop
      - install -Dm644 data/io.github.kmwallio.ultimateslice.mime.xml /app/share/mime/packages/io.github.kmwallio.ultimateslice.mime.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.metainfo.xml /app/share/metainfo/io.github.kmwallio.ultimateslice.metainfo.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.svg /app/share/icons/hicolor/scalable/apps/io.github.kmwallio.ultimateslice.svg
      - install -Dm644 data/io.github.kmwallio.ultimateslice-file.svg /app/share/icons/hicolor/scalable/mimetypes/io.github.kmwallio.ultimateslice-file.svg
    sources:
      - type: dir
        path: .
      - type: inline
        contents: |
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "cargo/vendor"
        dest: .cargo
        dest-filename: config.toml
      - cargo-sources.json
