app-id: io.github.kmwallio.ultimateslice
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: ultimate-slice
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/mnt
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
  env:
    CARGO_HOME: /run/build/ultimate-slice/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
modules:
  - name: ultimate-slice
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/ultimate-slice/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
    build-commands:
      - mkdir -p .cargo
      - |
        cat > .cargo/config.toml << 'EOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "cargo/vendor"
        EOF
      - cargo --offline build --release --locked
      - install -Dm755 target/release/ultimate-slice /app/bin/ultimate-slice
      - install -Dm644 data/io.github.kmwallio.ultimateslice.desktop /app/share/applications/io.github.kmwallio.ultimateslice.desktop
      - install -Dm644 data/io.github.kmwallio.ultimateslice.mime.xml /app/share/mime/packages/io.github.kmwallio.ultimateslice.mime.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.metainfo.xml /app/share/metainfo/io.github.kmwallio.ultimateslice.metainfo.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.svg /app/share/icons/hicolor/scalable/apps/io.github.kmwallio.ultimateslice.svg
      - install -Dm644 data/io.github.kmwallio.ultimateslice-file.svg /app/share/icons/hicolor/scalable/mimetypes/io.github.kmwallio.ultimateslice-file.svg
    sources:
      - type: dir
        path: .
      - cargo-sources.json
