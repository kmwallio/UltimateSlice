app-id: io.github.ultimateslice
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: ultimate-slice
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
modules:
  - name: ultimate-slice
    buildsystem: simple
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/ultimate-slice /app/bin/ultimate-slice
    sources:
      - type: dir
        path: .
