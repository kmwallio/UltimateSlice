title: UltimateSlice
email: hello@ultimateslice.app
description: >- # this means to ignore newlines until "baseurl:"
  A Final Cut Pro–inspired non-linear video editor built with GTK4 and Rust,
  powered by GStreamer.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: ultimateslice
github_username: kmwallio

# Build settings
markdown: kramdown
theme: null # We'll build our own theme or use a simple base.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections for documentation and blog
collections:
  docs:
    output: true
    permalink: /docs/:path/
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "doc"
