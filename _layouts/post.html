---
layout: default
---
<article class="post-card" style="max-width: 800px; margin: 40px auto; padding: 40px;">
  <header class="post-header">
    <h1 class="post-title" style="font-size: 2.5rem; margin-bottom: 10px;">{{ page.title | escape }}</h1>
    <p class="post-meta" style="color: #86868b; margin-bottom: 30px;">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
      {% if page.author %}
        • <span>{{ page.author }}</span>
      {% endif %}
    </p>
  </header>

  <div class="post-content markdown-body">
    {{ content }}
  </div>
</article>
