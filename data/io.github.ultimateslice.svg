<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background: warm caramel-orange (GNOME Orange 3 → Orange 5) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe6f"/>
      <stop offset="100%" stop-color="#9f5606"/>
    </linearGradient>

    <!-- Camera body: GNOME Dark 2 → Dark 4 -->
    <linearGradient id="cam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5e5c64"/>
      <stop offset="100%" stop-color="#3d3846"/>
    </linearGradient>

    <!-- Film magazine: slightly darker -->
    <linearGradient id="mag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4851"/>
      <stop offset="100%" stop-color="#2e2a38"/>
    </linearGradient>

    <!-- Lens glass: GNOME Blue 2 → Blue 5 -->
    <radialGradient id="lens" cx="30%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#99c1f1"/>
      <stop offset="38%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </radialGradient>

    <!-- Knife blade: metallic silver -->
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f6f5f4"/>
      <stop offset="50%" stop-color="#c8c7c6"/>
      <stop offset="100%" stop-color="#9a9996"/>
    </linearGradient>

    <!-- Drop shadow (knife only) -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5"
                    flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!--
      Cut line: (0, 48) → (128, 88)
        y = 0.3125·x + 48    angle ≈ 17.35°    centre (64, 68)

      camSide  — above the cut (camera exterior)
      cakeSide — below the cut (cake cross-section)
    -->
    <clipPath id="camSide">
      <polygon points="0,0 128,0 128,88 0,48"/>
    </clipPath>
    <clipPath id="cakeSide">
      <polygon points="0,48 128,88 128,128 0,128"/>
    </clipPath>
    <!-- Constrain cake layers to the camera body rectangle -->
    <clipPath id="camBody">
      <rect x="10" y="36" width="108" height="60" rx="5"/>
    </clipPath>
  </defs>

  <!-- ── Background (GNOME squircle icon shape) ── -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- ── CINEMA CAMERA EXTERIOR (above the cut line) ── -->
  <g clip-path="url(#camSide)">

    <!-- Film magazine (top-left, ARRI-style detachable box) -->
    <rect x="14" y="18" width="42" height="22" rx="4" fill="url(#mag)" stroke="#5e5c64" stroke-width="1.2"/>
    <!-- Magazine latches -->
    <rect x="18" y="19" width="10" height="6" rx="1.5" fill="#2a2835" stroke="#6e6c76" stroke-width="0.8"/>
    <rect x="42" y="19" width="10" height="6" rx="1.5" fill="#2a2835" stroke="#6e6c76" stroke-width="0.8"/>
    <!-- Magazine label area -->
    <rect x="30" y="22" width="18" height="11" rx="2" fill="#1a1826" stroke="#3d3846" stroke-width="0.5"/>
    <!-- Magazine horizontal seam -->
    <line x1="14" y1="30" x2="56" y2="30" stroke="#2a2835" stroke-width="0.9"/>

    <!-- Top carry handle (spans the body, very cinema-camera) -->
    <rect x="26" y="8" width="68" height="13" rx="6" fill="#3d3846" stroke="#5e5c64" stroke-width="1.2"/>
    <!-- Handle grip knurling lines -->
    <g stroke="#2d2b37" stroke-width="0.9" opacity="0.65">
      <line x1="33" y1="8" x2="33" y2="21"/>
      <line x1="39" y1="8" x2="39" y2="21"/>
      <line x1="45" y1="8" x2="45" y2="21"/>
      <line x1="51" y1="8" x2="51" y2="21"/>
      <line x1="57" y1="8" x2="57" y2="21"/>
      <line x1="63" y1="8" x2="63" y2="21"/>
      <line x1="69" y1="8" x2="69" y2="21"/>
      <line x1="75" y1="8" x2="75" y2="21"/>
      <line x1="81" y1="8" x2="81" y2="21"/>
      <line x1="87" y1="8" x2="87" y2="21"/>
    </g>

    <!-- Main camera body (wider and more rectangular than before) -->
    <rect x="10" y="36" width="108" height="60" rx="5" fill="url(#cam)"/>
    <!-- Body horizontal panel seam (separates top/bottom sections) -->
    <line x1="10" y1="54" x2="118" y2="54" stroke="#2a2835" stroke-width="0.9" opacity="0.55"/>

    <!-- Lens port darkened area (left half of body) -->
    <rect x="10" y="36" width="60" height="60" rx="5" fill="#1a1826" opacity="0.35"/>

    <!-- Big cinema prime lens assembly -->
    <!-- Outer housing / shroud ring -->
    <circle cx="40" cy="66" r="26" fill="#141420" stroke="#4a4851" stroke-width="2"/>
    <!-- Focus ring (largest, dashed to show gear teeth) -->
    <circle cx="40" cy="66" r="22" fill="#1c1c2a" stroke="#3d3846" stroke-width="1.5"
            stroke-dasharray="2.8,2"/>
    <!-- Iris / T-stop ring -->
    <circle cx="40" cy="66" r="17" fill="#111118" stroke="#5e5c64" stroke-width="1.2"/>
    <!-- Front lens element glass -->
    <circle cx="40" cy="66" r="13" fill="url(#lens)"/>
    <!-- Inner aperture pupil -->
    <circle cx="40" cy="66" r="6" fill="#040820" stroke="#1a5fb4" stroke-width="0.8"/>
    <!-- Lens highlight / flare -->
    <ellipse cx="32" cy="58" rx="4.5" ry="3" fill="#fff" opacity="0.28"/>
    <ellipse cx="45" cy="73" rx="2"   ry="1.5" fill="#fff" opacity="0.09"/>
    <!-- Focus-scale tick marks on outer ring (cardinal points) -->
    <g stroke="#9a9996" stroke-width="0.9" opacity="0.55">
      <line x1="40" y1="40" x2="40" y2="44"/>   <!-- top    -->
      <line x1="62" y1="57" x2="58" y2="59"/>   <!-- right  -->
      <line x1="40" y1="92" x2="40" y2="88"/>   <!-- bottom -->
      <line x1="18" y1="57" x2="22" y2="59"/>   <!-- left   -->
    </g>

    <!-- Right body panel: controls -->
    <!-- Large REC button (red, GNOME Red 4) -->
    <circle cx="96" cy="44" r="8" fill="#c01010" stroke="#8a0e0e" stroke-width="1.5"/>
    <circle cx="96" cy="44" r="5" fill="#e01b24"/>
    <circle cx="94" cy="42" r="2" fill="#ff8080" opacity="0.5"/>

    <!-- ISO/Gain control dial -->
    <circle cx="96" cy="66" r="7.5" fill="#2a2835" stroke="#5e5c64" stroke-width="1.2"/>
    <circle cx="96" cy="66" r="5"   fill="#3d3846"/>
    <line x1="96" y1="58.5" x2="96" y2="62" stroke="#9a9996" stroke-width="1.2"/>

    <!-- Timecode display (LED/LCD panel) -->
    <rect x="66" y="57" width="24" height="12" rx="2" fill="#0d1117" stroke="#3d3846" stroke-width="0.8"/>
    <rect x="68" y="59" width="20" height="8"  rx="1" fill="#000d08"/>
    <!-- Green TC digit blocks -->
    <g fill="#00e878" opacity="0.75">
      <rect x="69"   y="61" width="3" height="4" rx="0.5"/>
      <rect x="73.5" y="61" width="3" height="4" rx="0.5"/>
      <rect x="79"   y="61" width="3" height="4" rx="0.5"/>
      <rect x="83.5" y="61" width="3" height="4" rx="0.5"/>
    </g>

    <!-- Electronic viewfinder (EVF) — right side, protruding -->
    <rect x="112" y="40" width="12" height="24" rx="3" fill="#2a2835" stroke="#4a4851" stroke-width="1"/>
    <!-- EVF eyepiece cup -->
    <rect x="120" y="44" width="8"  height="16" rx="2" fill="#1a1826" stroke="#3d3846" stroke-width="0.8"/>
    <!-- EVF diopter adjustment lines -->
    <g stroke="#5e5c64" stroke-width="0.8">
      <line x1="112" y1="48" x2="116" y2="48"/>
      <line x1="112" y1="54" x2="116" y2="54"/>
      <line x1="112" y1="60" x2="116" y2="60"/>
    </g>

    <!-- Bottom accessory rail (15mm / cheese plate) -->
    <rect x="10" y="91" width="108" height="5" rx="2" fill="#252432" stroke="#4a4851" stroke-width="0.8"/>
    <!-- Rail mount screws -->
    <circle cx="22"  cy="93.5" r="2" fill="#3d3846" stroke="#5e5c64" stroke-width="0.7"/>
    <circle cx="64"  cy="93.5" r="2" fill="#3d3846" stroke="#5e5c64" stroke-width="0.7"/>
    <circle cx="106" cy="93.5" r="2" fill="#3d3846" stroke="#5e5c64" stroke-width="0.7"/>
  </g>

  <!-- ── CAKE CROSS-SECTION (below the cut, clipped to camera body) ── -->
  <g clip-path="url(#cakeSide)">
    <g clip-path="url(#camBody)">
      <!-- Five alternating cake layers, bottom → top -->
      <rect x="10" y="88" width="108" height="12" fill="#3e2723"/>  <!-- dark chocolate  -->
      <rect x="10" y="76" width="108" height="12" fill="#f5f0e8"/>  <!-- vanilla cream    -->
      <rect x="10" y="64" width="108" height="12" fill="#c27a2e"/>  <!-- golden sponge    -->
      <rect x="10" y="52" width="108" height="12" fill="#f5f0e8"/>  <!-- vanilla cream    -->
      <rect x="10" y="36" width="108" height="16" fill="#d4952a"/>  <!-- top sponge       -->
    </g>
  </g>

  <!-- ── Cut edge shadow (adds depth to the slice) ── -->
  <line x1="0" y1="48" x2="128" y2="88"
        stroke="#000" stroke-width="1.5" opacity="0.18"/>

  <!-- ── KITCHEN KNIFE (along the cut line, handle at lower-right) ── -->
  <!--
    translate(64, 68) rotate(17.35°) — local x-axis aligns with the cut
    Blade tip  local x ≈ −65 → canvas ≈ (2, 49)
    Bolster    local x ≈ +32 → canvas ≈ (95, 78)
    Handle end local x ≈ +62 → canvas ≈ (123, 87)
  -->
  <g transform="translate(64,68) rotate(17.35)" filter="url(#shadow)">
    <!-- Blade (slightly tapered toward tip) -->
    <polygon points="-65,-2.5 32,-3.5 32,3 -65,2.5" fill="url(#blade)"/>
    <!-- Sharp-edge highlight -->
    <line x1="-65" y1="-2.5" x2="32" y2="-3.5"
          stroke="#fff" stroke-width="0.6" opacity="0.55"/>
    <!-- Bolster -->
    <rect x="32" y="-6" width="7" height="12" rx="1.5" fill="#8f7a5e"/>
    <!-- Handle (dark wood) -->
    <rect x="39" y="-8" width="23" height="16" rx="4" fill="#5c3d1e"/>
    <!-- Wood grain -->
    <g stroke="#7a5634" stroke-width="0.9" opacity="0.55">
      <line x1="45" y1="-8" x2="45" y2="8"/>
      <line x1="51" y1="-8" x2="51" y2="8"/>
      <line x1="57" y1="-8" x2="57" y2="8"/>
    </g>
    <!-- Brass rivets -->
    <circle cx="44" cy="0" r="2.5" fill="#c0a878"/>
    <circle cx="55" cy="0" r="2.5" fill="#c0a878"/>
  </g>
</svg>
