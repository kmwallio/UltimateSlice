<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Lens glass: radial gradient (curved surface — HIG permitted) -->
    <radialGradient id="lens" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#99c1f1"/>
      <stop offset="40%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </radialGradient>

    <!-- Knife blade: metallic gradient (skeuomorphic metal — HIG permitted) -->
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f6f5f4"/>
      <stop offset="50%"  stop-color="#c8c7c6"/>
      <stop offset="100%" stop-color="#9a9996"/>
    </linearGradient>

    <!-- Drop shadow (knife only) -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5"
                    flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!--
      Cut line: (0, 50) → (128, 97)
        y = (47/128)·x + 50 ≈ 0.3672·x + 50    angle ≈ 20.2°    centre (64, 73.5)

      3D cabinet projection — depth vector: (+8, −4) upper-right

      camSide  — above the cut (camera exterior)
      cakeSide — below the cut (cake cross-section)
    -->
    <clipPath id="camSide">
      <polygon points="0,0 128,0 128,97 0,50"/>
    </clipPath>
    <clipPath id="cakeSide">
      <polygon points="0,50 128,97 128,128 0,128"/>
    </clipPath>
    <!-- Clip cake layers to the camera body front face -->
    <clipPath id="bodyFace">
      <rect x="5" y="42" width="102" height="62" rx="6"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       3D TOP FACES — cabinet projection (depth vector +8, −4)
       Always above the cut line; no clip needed.
       ═══════════════════════════════════════════════════════════ -->

  <!-- Camera body: TOP face -->
  <polygon points="5,42  107,42  115,38  13,38"  fill="#e5b84a"/>
  <!-- Film magazine: TOP face -->
  <polygon points="5,14  49,14  57,10  13,10"    fill="#62a0ea"/>
  <!-- Handle: TOP face -->
  <polygon points="20,6  90,6   98,2   28,2"     fill="#f66151"/>

  <!-- ═══════════════════════════════════════════════════════════
       CAMERA EXTERIOR — all drawn above the cut (clipped by camSide)
       ═══════════════════════════════════════════════════════════ -->
  <g clip-path="url(#camSide)">

    <!-- Camera body: RIGHT side face -->
    <polygon points="107,42  115,38  115,100  107,104" fill="#8a5200"/>
    <!-- Film magazine: RIGHT side face -->
    <polygon points="49,14  57,10  57,40  49,44"       fill="#1553b0"/>
    <!-- Handle: RIGHT side face -->
    <polygon points="90,6   98,2   98,16  90,19"       fill="#9a0007"/>

    <!-- ── Handle front face (bright toy red) ── -->
    <rect x="20" y="6" width="70" height="13" rx="6.5"
          fill="#e01b24" stroke="#9a0007" stroke-width="1.2"/>
    <!-- Handle knurling grip lines -->
    <g stroke="#9a0007" stroke-width="0.9" opacity="0.55">
      <line x1="28" y1="6"  x2="28" y2="19"/>
      <line x1="34" y1="6"  x2="34" y2="19"/>
      <line x1="40" y1="6"  x2="40" y2="19"/>
      <line x1="46" y1="6"  x2="46" y2="19"/>
      <line x1="52" y1="6"  x2="52" y2="19"/>
      <line x1="58" y1="6"  x2="58" y2="19"/>
      <line x1="64" y1="6"  x2="64" y2="19"/>
      <line x1="70" y1="6"  x2="70" y2="19"/>
      <line x1="76" y1="6"  x2="76" y2="19"/>
      <line x1="82" y1="6"  x2="82" y2="19"/>
    </g>

    <!-- ── Film magazine front face (bright toy blue) ── -->
    <rect x="5" y="14" width="44" height="30" rx="5"
          fill="#1e78e4" stroke="#1553b0" stroke-width="1.5"/>
    <!-- Magazine label window -->
    <rect x="9" y="19" width="28" height="18" rx="3" fill="#1a5fb4"/>
    <!-- Label top stripe accent -->
    <rect x="9" y="19" width="28" height="5"  rx="2" fill="#3584e4"/>
    <!-- Label horizontal lines -->
    <g stroke="#7ec8f4" stroke-width="1.2" opacity="0.7">
      <line x1="12" y1="28" x2="34" y2="28"/>
      <line x1="12" y1="32" x2="34" y2="32"/>
    </g>
    <!-- Magazine latches (toy clips) -->
    <rect x="6"  y="15" width="7" height="5" rx="1.5" fill="#1553b0" stroke="#62a0ea" stroke-width="0.7"/>
    <rect x="41" y="15" width="7" height="5" rx="1.5" fill="#1553b0" stroke="#62a0ea" stroke-width="0.7"/>

    <!-- ── Camera body front face (warm golden toy wood) ── -->
    <rect x="5" y="42" width="102" height="62" rx="6"
          fill="#d4952a" stroke="#804000" stroke-width="1.5"/>
    <!-- Wood grain texture lines -->
    <g stroke="#b07010" stroke-width="0.6" opacity="0.3">
      <line x1="5" y1="52"  x2="107" y2="52"/>
      <line x1="5" y1="60"  x2="107" y2="60"/>
      <line x1="5" y1="68"  x2="107" y2="68"/>
      <line x1="5" y1="76"  x2="107" y2="76"/>
      <line x1="5" y1="84"  x2="107" y2="84"/>
      <line x1="5" y1="92"  x2="107" y2="92"/>
      <line x1="5" y1="100" x2="107" y2="100"/>
    </g>

    <!-- Lens port darkened zone (left side) -->
    <rect x="5" y="42" width="58" height="62" rx="6"
          fill="#241f31" opacity="0.22"/>

    <!-- ── Cinema lens assembly (concentric rings, slightly offset for 3D) ── -->
    <!-- Barrel extrusion depth shadow -->
    <circle cx="36" cy="73" r="27" fill="#1a1826" opacity="0.4"/>
    <!-- Outer shroud ring -->
    <circle cx="34" cy="73" r="26" fill="#241f31" stroke="#4a4851" stroke-width="2.5"/>
    <!-- Focus ring (dashed gear-tooth) -->
    <circle cx="34" cy="73" r="22" fill="#2d2b37" stroke="#3d3846" stroke-width="1.5"
            stroke-dasharray="3,2"/>
    <!-- Iris / T-stop ring -->
    <circle cx="34" cy="73" r="17" fill="#1a1826" stroke="#5e5c64" stroke-width="1.5"/>
    <!-- Front glass element -->
    <circle cx="34" cy="73" r="13" fill="url(#lens)"/>
    <!-- Aperture pupil -->
    <circle cx="34" cy="73" r="5.5" fill="#040820" stroke="#1a5fb4" stroke-width="1"/>
    <!-- Glass highlights -->
    <ellipse cx="28" cy="66" rx="4"   ry="2.5" fill="#fff" opacity="0.32"/>
    <ellipse cx="40" cy="80" rx="2"   ry="1.5" fill="#fff" opacity="0.10"/>
    <!-- Outer ring tick marks -->
    <g stroke="#9a9996" stroke-width="1" opacity="0.6">
      <line x1="34" y1="47" x2="34" y2="51"/>
      <line x1="56" y1="65" x2="52" y2="67"/>
      <line x1="34" y1="99" x2="34" y2="95"/>
      <line x1="12" y1="65" x2="16" y2="67"/>
    </g>

    <!-- ── Controls panel: big toy-style round buttons ── -->
    <!-- REC button (big bright red) -->
    <circle cx="82" cy="55" r="9.5" fill="#9a0007" stroke="#7a0000" stroke-width="1.5"/>
    <circle cx="82" cy="55" r="7.5" fill="#e01b24"/>
    <circle cx="79" cy="52" r="2.5" fill="#ff8080" opacity="0.55"/>

    <!-- Mode dial (big bright yellow knob) -->
    <circle cx="82" cy="76" r="8.5" fill="#c07800" stroke="#804000" stroke-width="1.5"/>
    <circle cx="82" cy="76" r="6.5" fill="#e5a50a"/>
    <line x1="82" y1="68" x2="82" y2="72" stroke="#804000" stroke-width="2" stroke-linecap="round"/>

    <!-- Power/indicator button (bright green) -->
    <circle cx="95" cy="55" r="5.5" fill="#1a7340" stroke="#0f5228" stroke-width="1"/>
    <circle cx="95" cy="55" r="4"   fill="#26a269"/>
    <circle cx="93" cy="53" r="1.5" fill="#57e389" opacity="0.75"/>

    <!-- Timecode LED display -->
    <rect x="66" y="65" width="26" height="13" rx="2.5" fill="#0d1117" stroke="#3d3846" stroke-width="0.8"/>
    <rect x="68" y="67" width="22" height="9"  rx="1.5" fill="#000d08"/>
    <g fill="#00e878" opacity="0.8">
      <rect x="69"   y="69" width="3" height="5" rx="0.5"/>
      <rect x="73.5" y="69" width="3" height="5" rx="0.5"/>
      <rect x="79"   y="69" width="3" height="5" rx="0.5"/>
      <rect x="83.5" y="69" width="3" height="5" rx="0.5"/>
    </g>

    <!-- Viewfinder (right side protrusion) -->
    <rect x="107" y="46" width="14" height="22" rx="3" fill="#241f31" stroke="#4a4851" stroke-width="1"/>
    <rect x="114" y="50" width="10" height="14" rx="2" fill="#1a1826" stroke="#3d3846" stroke-width="0.8"/>
    <g stroke="#5e5c64" stroke-width="0.8">
      <line x1="107" y1="54" x2="112" y2="54"/>
      <line x1="107" y1="60" x2="112" y2="60"/>
    </g>

    <!-- Bottom accessory rail -->
    <rect x="5" y="99" width="102" height="5" rx="2.5"
          fill="#804000" stroke="#5a3000" stroke-width="0.8"/>
    <!-- Rail bolt heads (toy-style) -->
    <circle cx="16"  cy="101.5" r="2.5" fill="#d4952a" stroke="#804000" stroke-width="0.7"/>
    <circle cx="56"  cy="101.5" r="2.5" fill="#d4952a" stroke="#804000" stroke-width="0.7"/>
    <circle cx="96"  cy="101.5" r="2.5" fill="#d4952a" stroke="#804000" stroke-width="0.7"/>

  </g> <!-- end camSide clip -->

  <!-- ═══════════════════════════════════════════════════════════
       CAKE CROSS-SECTION — below the cut, clipped to camera body
       Rich and colourful toy-cake layers!
       ═══════════════════════════════════════════════════════════ -->
  <g clip-path="url(#cakeSide)">
    <g clip-path="url(#bodyFace)">
      <!-- Layers bottom → top: each 12 px tall, spaced at 12 px intervals -->
      <!-- bodyFace clip confines these to x=5..107, y=42..104 -->
      <rect x="5" y="96" width="102" height="12" fill="#3e2723"/>  <!-- dark chocolate ganache -->
      <rect x="5" y="84" width="102" height="12" fill="#fffde7"/>  <!-- whipped cream          -->
      <rect x="5" y="72" width="102" height="12" fill="#e53935"/>  <!-- raspberry jam          -->
      <rect x="5" y="60" width="102" height="12" fill="#fffde7"/>  <!-- whipped cream          -->
      <rect x="5" y="42" width="102" height="18" fill="#f9a825"/>  <!-- golden sponge (top)    -->
    </g>
  </g>

  <!-- ── Cut edge shadow (depth at the slice) ── -->
  <line x1="0" y1="50" x2="128" y2="97"
        stroke="#000" stroke-width="2" opacity="0.22"/>

  <!-- ── Camera body 3D bottom edge strip ── -->
  <polygon points="5,104  107,104  115,100  115,101  107,105  5,105"
           fill="#8a5200"/>

  <!-- ═══════════════════════════════════════════════════════════
       KITCHEN KNIFE — along the cut line, handle at lower-right
         translate(64, 73.5) rotate(20.2°)
         Blade tip  ≈ (3,  51)
         Bolster    ≈ (94, 84)
         Handle end ≈ (122, 95)
       ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(64,73.5) rotate(20.2)" filter="url(#shadow)">
    <!-- Blade (slightly tapered toward tip) -->
    <polygon points="-65,-2.5 32,-3.5 32,3 -65,2.5" fill="url(#blade)"/>
    <!-- Sharp-edge highlight -->
    <line x1="-65" y1="-2.5" x2="32" y2="-3.5"
          stroke="#fff" stroke-width="0.6" opacity="0.55"/>
    <!-- Bolster -->
    <rect x="32" y="-6" width="7" height="12" rx="1.5" fill="#8f7a5e"/>
    <!-- Handle (dark wood) -->
    <rect x="39" y="-8" width="23" height="16" rx="4" fill="#5c3d1e"/>
    <!-- Wood grain -->
    <g stroke="#7a5634" stroke-width="0.9" opacity="0.55">
      <line x1="45" y1="-8" x2="45" y2="8"/>
      <line x1="51" y1="-8" x2="51" y2="8"/>
      <line x1="57" y1="-8" x2="57" y2="8"/>
    </g>
    <!-- Brass rivets -->
    <circle cx="44" cy="0" r="2.5" fill="#c0a878"/>
    <circle cx="55" cy="0" r="2.5" fill="#c0a878"/>
  </g>
</svg>
