<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background: warm caramel-orange (GNOME Orange 3 → Orange 5) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbe6f"/>
      <stop offset="100%" stop-color="#9f5606"/>
    </linearGradient>

    <!-- Camera body: GNOME Dark 2 → Dark 4 -->
    <linearGradient id="cam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5e5c64"/>
      <stop offset="100%" stop-color="#3d3846"/>
    </linearGradient>

    <!-- Lens glass: GNOME Blue 2 → Blue 5 -->
    <radialGradient id="lens" cx="30%" cy="30%" r="70%">
      <stop offset="0%"  stop-color="#99c1f1"/>
      <stop offset="38%" stop-color="#3584e4"/>
      <stop offset="100%" stop-color="#1a5fb4"/>
    </radialGradient>

    <!-- Knife blade: metallic silver -->
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f6f5f4"/>
      <stop offset="50%" stop-color="#c8c7c6"/>
      <stop offset="100%" stop-color="#9a9996"/>
    </linearGradient>

    <!-- Drop shadow (knife only) -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5"
                    flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!--
      Cut line: (0, 48) → (128, 88)
        y = 0.3125·x + 48    angle ≈ 17.35°    centre (64, 68)

      camSide  — above the cut (camera exterior)
      cakeSide — below the cut (cake cross-section)
    -->
    <clipPath id="camSide">
      <polygon points="0,0 128,0 128,88 0,48"/>
    </clipPath>
    <clipPath id="cakeSide">
      <polygon points="0,48 128,88 128,128 0,128"/>
    </clipPath>
    <!-- Constrain cake layers to the camera body rectangle -->
    <clipPath id="camBody">
      <rect x="14" y="38" width="100" height="62" rx="8"/>
    </clipPath>
  </defs>

  <!-- ── Background (GNOME squircle icon shape) ── -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- ── CAMERA EXTERIOR (above the cut line) ── -->
  <g clip-path="url(#camSide)">
    <!-- Viewfinder bump on top -->
    <rect x="46" y="26" width="28" height="14" rx="5" fill="#3d3846"/>
    <!-- Main camera body -->
    <rect x="14" y="38" width="100" height="62" rx="8" fill="url(#cam)"/>
    <!-- Lens outer housing -->
    <circle cx="48" cy="68" r="20" fill="#1c1c2e" stroke="#5e5c64" stroke-width="1.5"/>
    <circle cx="48" cy="68" r="15" fill="#111116"/>
    <!-- Lens glass -->
    <circle cx="48" cy="68" r="11" fill="url(#lens)"/>
    <circle cx="48" cy="68" r="4.5" fill="#1a5fb4"/>
    <!-- Lens highlight -->
    <ellipse cx="43" cy="63" rx="3.5" ry="2.5" fill="#fff" opacity="0.35"/>
    <!-- Record button (GNOME Red 4) -->
    <circle cx="104" cy="51" r="5" fill="#e01b24" stroke="#a51d2d" stroke-width="1.2"/>
    <circle cx="103" cy="50" r="1.8" fill="#ff7777" opacity="0.45"/>
    <!-- Body horizontal seam -->
    <line x1="14" y1="56" x2="114" y2="56" stroke="#2d2b37" stroke-width="1" opacity="0.5"/>
    <!-- Viewfinder eyepiece (right) -->
    <rect x="112" y="44" width="8" height="14" rx="2" fill="#252525"/>
  </g>

  <!-- ── CAKE CROSS-SECTION (below the cut, clipped to camera body) ── -->
  <g clip-path="url(#cakeSide)">
    <g clip-path="url(#camBody)">
      <!-- Five alternating cake layers, bottom → top -->
      <rect x="14" y="88" width="100" height="12" fill="#3e2723"/>  <!-- dark chocolate  -->
      <rect x="14" y="76" width="100" height="12" fill="#f5f0e8"/>  <!-- vanilla cream    -->
      <rect x="14" y="64" width="100" height="12" fill="#c27a2e"/>  <!-- golden sponge    -->
      <rect x="14" y="52" width="100" height="12" fill="#f5f0e8"/>  <!-- vanilla cream    -->
      <rect x="14" y="38" width="100" height="14" fill="#d4952a"/>  <!-- top sponge       -->
    </g>
  </g>

  <!-- ── Cut edge shadow (adds depth to the slice) ── -->
  <line x1="0" y1="48" x2="128" y2="88"
        stroke="#000" stroke-width="1.5" opacity="0.18"/>

  <!-- ── KITCHEN KNIFE (along the cut line, handle at lower-right) ── -->
  <!--
    translate(64, 68) rotate(17.35°) — local x-axis aligns with the cut
    Blade tip  local x ≈ −65 → canvas ≈ (2, 49)
    Bolster    local x ≈ +32 → canvas ≈ (95, 78)
    Handle end local x ≈ +62 → canvas ≈ (123, 87)
  -->
  <g transform="translate(64,68) rotate(17.35)" filter="url(#shadow)">
    <!-- Blade (slightly tapered toward tip) -->
    <polygon points="-65,-2.5 32,-3.5 32,3 -65,2.5" fill="url(#blade)"/>
    <!-- Sharp-edge highlight -->
    <line x1="-65" y1="-2.5" x2="32" y2="-3.5"
          stroke="#fff" stroke-width="0.6" opacity="0.55"/>
    <!-- Bolster -->
    <rect x="32" y="-6" width="7" height="12" rx="1.5" fill="#8f7a5e"/>
    <!-- Handle (dark wood) -->
    <rect x="39" y="-8" width="23" height="16" rx="4" fill="#5c3d1e"/>
    <!-- Wood grain -->
    <g stroke="#7a5634" stroke-width="0.9" opacity="0.55">
      <line x1="45" y1="-8" x2="45" y2="8"/>
      <line x1="51" y1="-8" x2="51" y2="8"/>
      <line x1="57" y1="-8" x2="57" y2="8"/>
    </g>
    <!-- Brass rivets -->
    <circle cx="44" cy="0" r="2.5" fill="#c0a878"/>
    <circle cx="55" cy="0" r="2.5" fill="#c0a878"/>
  </g>
</svg>
